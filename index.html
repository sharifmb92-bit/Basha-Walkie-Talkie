<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BusTalk - Walkie Talkie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .ptt-active { background-color: #ef4444 !important; transform: scale(0.95); }
        .bg-gray-custom { background-color: #333333; } /* Tu código de gris personalizado */
    </style>
</head>
<body class="bg-gray-custom text-white font-sans h-screen flex flex-col">

    <!-- Cabecera -->
    <header class="p-4 bg-black shadow-lg flex justify-between items-center">
        <h1 class="text-xl font-bold text-yellow-500"><i class="fas fa-bus"></i> BusTalk</h1>
        <span id="status" class="text-xs bg-green-600 px-2 py-1 rounded">En línea</span>
    </header>

    <!-- Lista de Compañeros -->
    <main class="flex-1 overflow-y-auto p-4 space-y-3">
        <div class="bg-gray-800 p-3 rounded-lg border-l-4 border-yellow-500 flex justify-between items-center">
            <div>
                <p class="font-bold">Compañero 1 (Línea 01)</p>
                <p class="text-sm text-gray-400">📍 Cerca de Alaior • <i class="fas fa-users"></i> 15 pax</p>
            </div>
            <div class="flex space-x-2">
                <button class="bg-blue-600 p-2 rounded-full"><i class="fas fa-map-marker-alt"></i></button>
            </div>
        </div>
    </main>

    <!-- Panel de Control Inferior -->
    <footer class="p-6 bg-black rounded-t-3xl shadow-2xl">
        <div class="flex flex-col items-center space-y-4">
            
            <!-- Contador de Pasajeros rápido -->
            <div class="flex items-center space-x-6 mb-2">
                <button onclick="updatePax(-1)" class="text-2xl bg-gray-700 w-10 h-10 rounded-full">-</button>
                <div class="text-center">
                    <p class="text-xs uppercase text-gray-400">Mis Pasajeros</p>
                    <p id="pax-count" class="text-3xl font-bold">0</p>
                </div>
                <button onclick="updatePax(1)" class="text-2xl bg-gray-700 w-10 h-10 rounded-full">+</button>
            </div>

            <!-- Botón PTT (Push to Talk) -->
            <button id="ptt-btn" 
                class="w-32 h-32 rounded-full bg-yellow-500 flex flex-col items-center justify-center shadow-lg active:ptt-active transition-all">
                <i class="fas fa-microphone text-4xl mb-1 text-black"></i>
                <span class="text-black font-black text-sm">HABLAR</span>
            </button>
            
            <p class="text-xs text-gray-500 italic">Mantén pulsado para hablar en el canal</p>
        </div>
    </footer>

    <script>
        let pax = 0;
        function updatePax(val) {
            pax = Math.max(0, pax + val);
            document.getElementById('pax-count').innerText = pax;
            // Aquí conectarías con Firebase para actualizar tu estado
        }

        // Lógica visual del PTT
        const btn = document.getElementById('ptt-btn');
        btn.addEventListener('mousedown', () => btn.classList.add('ptt-active'));
        btn.addEventListener('mouseup', () => btn.classList.remove('ptt-active'));
        btn.addEventListener('touchstart', (e) => { e.preventDefault(); btn.classList.add('ptt-active'); });
        btn.addEventListener('touchend', () => btn.classList.remove('ptt-active'));
    </script>
</body>
</html>
